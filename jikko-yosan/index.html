<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実行予算ダッシュボード — トイザらス・ベビーザらス　原復工事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50:#EEF2FF; --blue-100:#D9E6FF; --blue-300:#9DB7F9;
    --blue-500:#4979F5; --blue-700:#264AF4; --blue-900:#0017C1;
    --gray-0:#FFFFFF; --gray-50:#FAFAFB; --gray-100:#F4F5F7;
    --gray-200:#E8EAEE; --gray-300:#D5D8DE; --gray-400:#A0A4AB;
    --gray-500:#6B7280; --gray-700:#3F4451; --gray-900:#1A1A1A;
    /* 状態色 */
    --healthy-500:#10B981; --healthy-600:#059669; --healthy-700:#047857;
    --healthy-bg:#ECFDF5;
    --warn-500:#F59E0B;   --warn-600:#D97706;   --warn-700:#B45309;
    --warn-bg:#FFFBEB;
    --danger-500:#EF4444; --danger-600:#DC2626; --danger-700:#B91C1C;
    --danger-bg:#FEF2F2;
    /* 原価/外注 強調 */
    --cost-500:#E11D48;   --cost-600:#BE123C;
    --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
    --shadow-md:0 4px 6px -1px rgba(15,23,42,.08),0 2px 4px -2px rgba(15,23,42,.04);
    --shadow-lg:0 10px 20px -3px rgba(15,23,42,.10),0 4px 8px -2px rgba(15,23,42,.05);
    --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:20px;
    --font-sans:"Inter","Noto Sans JP","Hiragino Kaku Gothic ProN","Meiryo","Yu Gothic",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{font-family:var(--font-sans);background:var(--gray-50);color:var(--gray-900);min-height:100vh;line-height:1.5;font-feature-settings:"tnum" 1,"palt" 1}

  /* ── ログイン ── */
  #login-overlay{
    position:fixed;inset:0;background:var(--gray-50);
    display:flex;align-items:center;justify-content:center;z-index:100;
  }
  .login-card{
    background:var(--gray-0);border:1px solid var(--gray-200);
    border-radius:var(--radius-lg);box-shadow:var(--shadow-md);
    padding:36px 40px;max-width:380px;width:90%;
  }
  .login-card h1{font-size:1.15rem;font-weight:700;margin-bottom:6px;letter-spacing:.01em}
  .login-card .sub{font-size:.78rem;color:var(--gray-500);margin-bottom:22px}
  .login-card label{display:block;font-size:.78rem;color:var(--gray-700);margin-bottom:6px;font-weight:500}
  .login-card input[type=password]{
    width:100%;padding:10px 12px;border:1px solid var(--gray-300);
    border-radius:var(--radius-sm);font-family:inherit;font-size:.95rem;
    background:var(--gray-50);transition:border-color .15s,background .15s;
  }
  .login-card input[type=password]:focus{outline:none;border-color:var(--blue-500);background:var(--gray-0)}
  .login-card button{
    width:100%;margin-top:14px;padding:10px;background:var(--blue-700);
    color:#fff;border:none;border-radius:var(--radius-sm);
    font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;
    transition:background .15s;
  }
  .login-card button:hover{background:var(--blue-900)}
  .login-card .err{
    margin-top:10px;font-size:.78rem;color:var(--danger-700);
    min-height:1.1em;font-weight:500;
  }

  /* ── 本体 ── */
  #app{display:none}

  /* 控えめヘッダ + 工事情報を1段に */
  header.app-header{
    background:var(--gray-0);border-bottom:1px solid var(--gray-200);
    padding:10px 28px;
  }
  .header-inner{
    max-width:1280px;margin:0 auto;display:flex;align-items:center;
    justify-content:space-between;gap:14px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{
    width:28px;height:28px;border-radius:6px;
    background:linear-gradient(135deg,var(--blue-500) 0%,var(--blue-700) 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:.72rem;letter-spacing:.04em;
  }
  .brand .ttl{font-size:.82rem;font-weight:700;color:var(--gray-700);letter-spacing:.02em}
  .build-info{font-size:.65rem;color:var(--gray-400);text-align:right;line-height:1.4}

  .project-bar{
    background:var(--gray-0);border-bottom:1px solid var(--gray-200);
    padding:10px 28px;
  }
  .project-inner{
    max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;
    gap:8px 22px;align-items:baseline;
  }
  .pj-field{display:flex;align-items:baseline;gap:6px}
  .pj-field .lab{font-size:.66rem;color:var(--gray-400);font-weight:500;letter-spacing:.04em}
  .pj-field .val{font-size:.78rem;color:var(--gray-700);font-weight:600}
  .pj-field.name .val{font-size:.88rem;color:var(--gray-900)}

  main{max-width:1280px;margin:22px auto;padding:0 28px 56px}

  /* ─────────── 1) 粗利率 hero ─────────── */
  .hero{
    background:var(--gray-0);
    border:1px solid var(--gray-200);
    border-radius:var(--radius-xl);
    padding:32px 36px 36px;
    box-shadow:var(--shadow-md);
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .hero-grid{
    display:grid;
    grid-template-columns:auto 1fr;
    gap:36px;
    align-items:center;
  }
  .hero-left{
    text-align:center;
    padding:0 18px;
  }
  .hero-label{
    font-size:.82rem;
    color:var(--gray-500);
    font-weight:600;
    letter-spacing:.08em;
    margin-bottom:6px;
  }
  .hero-num{
    font-size:7.5rem;            /* 120px 級 */
    font-weight:800;
    line-height:1;
    letter-spacing:-.04em;
    font-variant-numeric:tabular-nums;
    display:inline-flex;
    align-items:flex-start;
  }
  .hero-num .pct{
    font-size:2.2rem;
    font-weight:700;
    margin-top:1.2rem;
    margin-left:6px;
    letter-spacing:0;
  }
  .hero-badge{
    display:inline-block;
    margin-top:14px;
    padding:6px 14px;
    border-radius:999px;
    font-size:.78rem;
    font-weight:700;
    letter-spacing:.04em;
  }
  /* hero 状態色 */
  .hero.healthy .hero-num,.hero.healthy .hero-num .pct{color:var(--healthy-600)}
  .hero.healthy .hero-badge{background:var(--healthy-bg);color:var(--healthy-700)}
  .hero.warn .hero-num,.hero.warn .hero-num .pct{color:var(--warn-600)}
  .hero.warn .hero-badge{background:var(--warn-bg);color:var(--warn-700)}
  .hero.danger .hero-num,.hero.danger .hero-num .pct{color:var(--danger-600)}
  .hero.danger .hero-badge{background:var(--danger-bg);color:var(--danger-700)}

  /* ─────────── 2) 請負 ↔ 原価 プログレスバー ─────────── */
  .hero-right{
    border-left:1px solid var(--gray-200);
    padding-left:36px;
  }
  .prog-title{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:10px;
  }
  .prog-title .lab{
    font-size:.78rem;color:var(--gray-500);font-weight:600;letter-spacing:.04em;
  }
  .prog-title .total{
    font-size:1.05rem;font-weight:700;color:var(--gray-900);
    font-variant-numeric:tabular-nums;
  }
  .prog-title .total .u{font-size:.78rem;color:var(--gray-500);font-weight:500;margin-left:3px}
  .prog-bar{
    position:relative;
    width:100%;
    height:54px;
    background:var(--healthy-bg);
    border:1px solid var(--gray-200);
    border-radius:var(--radius-md);
    overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(15,23,42,.05);
  }
  .prog-cost{
    position:absolute;left:0;top:0;bottom:0;
    background:linear-gradient(180deg,var(--cost-500) 0%,var(--cost-600) 100%);
    transition:width .6s cubic-bezier(.4,0,.2,1);
  }
  .prog-label{
    position:absolute;top:50%;transform:translateY(-50%);
    font-size:.82rem;font-weight:700;
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.18);
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
    letter-spacing:.01em;
  }
  .prog-label.cost{left:12px}
  .prog-label.profit{
    right:12px;color:var(--healthy-700);text-shadow:none;
    background:rgba(236,253,245,.92);
    padding:3px 8px;border-radius:6px;
  }
  .prog-legend{
    display:flex;justify-content:space-between;
    margin-top:8px;font-size:.74rem;color:var(--gray-500);
  }
  .prog-legend .lg{display:flex;align-items:center;gap:6px}
  .prog-legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .prog-legend .dot.cost{background:var(--cost-500)}
  .prog-legend .dot.profit{background:var(--healthy-500)}

  @media (max-width: 900px){
    .hero-grid{grid-template-columns:1fr;gap:20px}
    .hero-right{border-left:none;border-top:1px solid var(--gray-200);padding-left:0;padding-top:24px}
    .hero-num{font-size:5.5rem}
  }

  /* ─────────── 3) カテゴリ別 横棒 ─────────── */
  .cat-panel{
    background:var(--gray-0);
    border:1px solid var(--gray-200);
    border-radius:var(--radius-lg);
    padding:22px 26px 24px;
    box-shadow:var(--shadow-sm);
    margin-bottom:18px;
  }
  .panel-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:18px;
  }
  .panel-head h2{
    font-size:.95rem;font-weight:700;color:var(--gray-900);letter-spacing:.02em;
  }
  .panel-head .hint{font-size:.72rem;color:var(--gray-500);font-weight:500}

  .cat-list{display:flex;flex-direction:column;gap:14px}
  .cat-row{
    display:grid;
    grid-template-columns:160px 1fr 130px;
    gap:14px;
    align-items:center;
  }
  .cat-name{
    font-size:.84rem;font-weight:600;color:var(--gray-900);
    display:flex;flex-direction:column;gap:1px;
  }
  .cat-name .pct{
    font-size:.7rem;color:var(--gray-500);font-weight:500;
    font-variant-numeric:tabular-nums;
  }
  .cat-track{
    position:relative;height:26px;
    background:var(--gray-100);
    border-radius:var(--radius-sm);
    overflow:hidden;
  }
  .cat-fill{
    position:absolute;left:0;top:0;bottom:0;
    background:var(--blue-500);
    border-radius:var(--radius-sm);
    transition:width .55s cubic-bezier(.4,0,.2,1);
  }
  .cat-row.top .cat-fill{background:linear-gradient(90deg,var(--cost-500) 0%,var(--cost-600) 100%)}
  .cat-row.top .cat-name{color:var(--cost-600)}
  .cat-row.zero .cat-track{background:repeating-linear-gradient(45deg,var(--gray-100),var(--gray-100) 6px,var(--gray-50) 6px,var(--gray-50) 12px)}
  .cat-row.zero .cat-amt{color:var(--gray-400);font-style:italic}
  .cat-amt{
    text-align:right;
    font-size:.92rem;font-weight:700;color:var(--gray-900);
    font-variant-numeric:tabular-nums;letter-spacing:-.005em;
  }
  .cat-amt .u{font-size:.72rem;color:var(--gray-500);font-weight:500;margin-left:2px}
  .cat-row.top .cat-amt{color:var(--cost-600)}

  @media (max-width: 720px){
    .cat-row{grid-template-columns:120px 1fr 100px;gap:8px}
    .cat-amt{font-size:.8rem}
  }

  /* ─────────── 補助: 折りたたみ表 ─────────── */
  details.cat-table-wrap{
    background:var(--gray-0);border:1px solid var(--gray-200);
    border-radius:var(--radius-md);padding:0;
    box-shadow:var(--shadow-sm);
    overflow:hidden;
  }
  details.cat-table-wrap summary{
    list-style:none;cursor:pointer;
    padding:14px 22px;
    font-size:.85rem;font-weight:600;color:var(--gray-700);
    display:flex;align-items:center;justify-content:space-between;
    user-select:none;
  }
  details.cat-table-wrap summary::-webkit-details-marker{display:none}
  details.cat-table-wrap summary::after{
    content:"▼";font-size:.7rem;color:var(--gray-400);transition:transform .2s;
  }
  details.cat-table-wrap[open] summary::after{transform:rotate(180deg)}
  details.cat-table-wrap summary:hover{background:var(--gray-50)}

  table.cat{
    width:100%;border-collapse:collapse;font-size:.84rem;
    font-variant-numeric:tabular-nums;
  }
  table.cat th{
    text-align:left;font-weight:600;color:var(--gray-500);
    font-size:.7rem;letter-spacing:.05em;
    padding:8px 22px;border-top:1px solid var(--gray-200);
    border-bottom:2px solid var(--gray-200);
    background:var(--gray-50);
  }
  table.cat th.num{text-align:right}
  table.cat td{
    padding:8px 22px;border-bottom:1px solid var(--gray-100);color:var(--gray-900);
  }
  table.cat td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.cat tr.top td{color:var(--cost-600);font-weight:600}
  table.cat tfoot td{
    font-weight:700;color:var(--gray-900);
    border-top:2px solid var(--gray-300);border-bottom:none;
    background:var(--gray-50);padding:10px 22px;
  }

  footer{
    max-width:1280px;margin:18px auto 32px;padding:0 28px;
    font-size:.68rem;color:var(--gray-400);text-align:right;
  }
</style>
</head>
<body>

<!-- ───────── ログイン ───────── -->
<div id="login-overlay">
  <form class="login-card" id="login-form" autocomplete="off">
    <h1>実行予算ダッシュボード</h1>
    <div class="sub">トイザらス・ベビーザらス　原復工事</div>
    <label for="pw">パスワード</label>
    <input type="password" id="pw" autocomplete="current-password" required>
    <button type="submit">ログイン</button>
    <div class="err" id="login-err">&nbsp;</div>
  </form>
</div>

<!-- ───────── 本体 ───────── -->
<div id="app">
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">予算</div>
        <div class="ttl">実行予算ダッシュボード</div>
      </div>
      <div class="build-info">
        生成: 2026-06-16 20:45 JST<br>
        ソース: R7.1.14　盛岡市　トイザらス・ベビーザらス原復工事　　　　　　　　　　（イケダコーポレーション　.xlsx
      </div>
    </div>
  </header>

  <div class="project-bar">
    <div class="project-inner" id="project-fields"></div>
  </div>

  <main>
    <!-- 1) 粗利率 hero + 2) 請負/原価プログレス -->
    <section class="hero" id="hero">
      <div class="hero-grid">
        <div class="hero-left">
          <div class="hero-label">粗利率</div>
          <div class="hero-num" id="hero-num">—</div>
          <div><span class="hero-badge" id="hero-badge">—</span></div>
        </div>
        <div class="hero-right">
          <div class="prog-title">
            <span class="lab">請負金額 ↔ 原価消化</span>
            <span class="total" id="prog-total">—<span class="u">円</span></span>
          </div>
          <div class="prog-bar">
            <div class="prog-cost" id="prog-cost" style="width:0%"></div>
            <span class="prog-label cost" id="prog-label-cost">—</span>
            <span class="prog-label profit" id="prog-label-profit">—</span>
          </div>
          <div class="prog-legend">
            <span class="lg"><span class="dot cost"></span>原価合計（消化分）</span>
            <span class="lg"><span class="dot profit"></span>粗利益（残余）</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 3) カテゴリ別 横棒 -->
    <section class="cat-panel">
      <div class="panel-head">
        <h2>カテゴリ別 原価実績</h2>
        <span class="hint">金額順、トップ強調</span>
      </div>
      <div class="cat-list" id="cat-list"></div>
    </section>

    <!-- 補助: 折りたたみ表 -->
    <details class="cat-table-wrap">
      <summary>カテゴリ別 数表（合計含む）</summary>
      <table class="cat" id="cat-table">
        <thead>
          <tr>
            <th>カテゴリ</th>
            <th class="num">金額 (円)</th>
            <th class="num">構成比 (%)</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td>合計</td>
            <td class="num" id="cat-total">—</td>
            <td class="num">100.0%</td>
          </tr>
        </tfoot>
      </table>
    </details>
  </main>

  <footer>
    実行予算 xlsx → 単一 HTML build / 外部依存ゼロ / デジタル庁デザイン準拠
  </footer>
</div>

<script>
/* ───────── データ inline ───────── */
const DATA = {"info": {"name": "トイザらス・ベビーザらス　原復工事", "place": "盛岡市本宮", "client": "イケダコーポレーション", "start": "2024-01-14", "contract": "2025-11-29"}, "kpi": {"contract_amount": 5447000.0, "cost_total": 4175018.952, "gross_profit": 1271981.048, "gross_margin": 0.2335195608}, "categories": [{"label": "仮設", "amount": 0, "pct": 0.0}, {"label": "労務費", "amount": 182268.0, "pct": 4.365680780807562}, {"label": "法定福利費", "amount": 27212.6124, "pct": 0.651796140574569}, {"label": "外注費", "amount": 2500000.0, "pct": 59.87996769602402}, {"label": "産廃費", "amount": 1158600.0, "pct": 27.750772229045367}, {"label": "消耗品", "amount": 23550.0, "pct": 0.5640692956965462}, {"label": "機械代", "amount": 175000.0, "pct": 4.191597738721681}, {"label": "車両費", "amount": 90000.0, "pct": 2.1556788370568647}, {"label": "燃料費他", "amount": 18388.34, "pct": 0.44043728207340244}], "category_total": 4175018.9524, "built_at": "2026-06-16 20:45 JST", "source_xlsx": "R7.1.14　盛岡市　トイザらス・ベビーザらス原復工事　　　　　　　　　　（イケダコーポレーション　.xlsx"};
const PW_HASH = "412c31b7feb59137361293d732413c3a2498d0583d818ac4fd1d36fb821b78b2";

/* ───────── ログイン ───────── */
async function sha256(s) {
  const buf = new TextEncoder().encode(s);
  const h   = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, "0")).join("");
}

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw  = document.getElementById("pw").value;
  const err = document.getElementById("login-err");
  err.textContent = "";
  const h = await sha256(pw);
  if (h === PW_HASH) {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } else {
    err.textContent = "パスワードが違います";
    document.getElementById("pw").value = "";
  }
});

/* ───────── 描画 ───────── */
const fmtYen = (n) => Math.round(n).toLocaleString("ja-JP");
const fmtPct1 = (n) => n.toFixed(1) + "%";
const fmtPct2 = (n) => n.toFixed(2) + "%";

function renderProject() {
  const i = DATA.info;
  const fields = [
    { lab: "工事名",   val: i.name || "—",     cls: "name" },
    { lab: "場所",     val: i.place || "—",    cls: "" },
    { lab: "元請",     val: i.client || "—",   cls: "" },
    { lab: "契約日",   val: i.contract || "—", cls: "" },
    { lab: "着工日",   val: i.start || "—",    cls: "" },
  ];
  const html = fields.map(f =>
    `<div class="pj-field ${f.cls}"><span class="lab">${f.lab}</span><span class="val">${f.val}</span></div>`
  ).join("");
  document.getElementById("project-fields").innerHTML = html;
}

/* 1) 粗利率 hero */
function renderHero() {
  const k = DATA.kpi;
  const marginPct = k.gross_margin * 100;  /* 例: 23.35 */

  const hero = document.getElementById("hero");
  let cls = "danger", badge = "危険（粗利率 < 15%）";
  if (marginPct >= 25) {
    cls = "healthy"; badge = "健全（粗利率 25% 以上）";
  } else if (marginPct >= 15) {
    cls = "warn"; badge = "注意（粗利率 15-25%）";
  }
  hero.classList.remove("healthy", "warn", "danger");
  hero.classList.add(cls);

  const num = document.getElementById("hero-num");
  num.innerHTML = `${marginPct.toFixed(2)}<span class="pct">%</span>`;

  document.getElementById("hero-badge").textContent = badge;

  /* 2) プログレス */
  const contract = k.contract_amount;
  const cost     = k.cost_total;
  const profit   = k.gross_profit;
  const costPct  = contract > 0 ? (cost / contract) * 100 : 0;
  const profPct  = contract > 0 ? (profit / contract) * 100 : 0;

  document.getElementById("prog-total").innerHTML =
    `請負 ${fmtYen(contract)}<span class="u">円</span>`;
  document.getElementById("prog-cost").style.width = costPct.toFixed(4) + "%";
  document.getElementById("prog-label-cost").textContent =
    `原価 ${fmtYen(cost)} 円 (${fmtPct2(costPct)})`;
  document.getElementById("prog-label-profit").textContent =
    `粗利 ${fmtYen(profit)} 円 (${fmtPct2(profPct)})`;
}

/* 3) カテゴリ別 横棒 */
function renderCategories() {
  const sorted = [...DATA.categories].sort((a, b) => b.amount - a.amount);
  const max = Math.max(...sorted.map(c => c.amount), 1);
  const list = document.getElementById("cat-list");

  list.innerHTML = sorted.map((c, idx) => {
    const isZero = c.amount === 0;
    const isTop  = !isZero && idx === 0;
    const cls = [
      "cat-row",
      isTop  ? "top"  : "",
      isZero ? "zero" : "",
    ].filter(Boolean).join(" ");
    const widthPct = isZero ? 0 : (c.amount / max) * 100;
    const amtHtml = isZero
      ? `<span class="u">未計上</span>`
      : `${fmtYen(c.amount)}<span class="u">円</span>`;
    return `
      <div class="${cls}">
        <div class="cat-name">
          <span>${c.label}</span>
          <span class="pct">構成比 ${fmtPct1(c.pct)}</span>
        </div>
        <div class="cat-track">
          <div class="cat-fill" style="width:${widthPct.toFixed(4)}%"></div>
        </div>
        <div class="cat-amt">${amtHtml}</div>
      </div>`;
  }).join("");
}

/* 補助: 表 */
function renderTable() {
  const sorted = [...DATA.categories].sort((a, b) => b.amount - a.amount);
  const tbody = document.querySelector("#cat-table tbody");
  tbody.innerHTML = sorted.map((r, idx) =>
    `<tr class="${idx === 0 && r.amount > 0 ? 'top' : ''}">
       <td>${r.label}</td>
       <td class="num">${fmtYen(r.amount)}</td>
       <td class="num">${fmtPct1(r.pct)}</td>
     </tr>`
  ).join("");
  document.getElementById("cat-total").textContent = fmtYen(DATA.category_total);
}

function render() {
  renderProject();
  renderHero();
  renderCategories();
  renderTable();
}
</script>
